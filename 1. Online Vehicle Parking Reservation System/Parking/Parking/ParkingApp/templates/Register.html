{% load static %}
<html>
<head>
<title>Online Vehicle Parking</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
<script language="javascript">
	function validate(formObj)
	{
	if(formObj.t1.value.length==0)
	{
	alert("Please Enter username");
	formObj.t1.focus();
	return false;
	}
	if(formObj.t2.value.length==0)
	{
	alert("Please Enter password");
	formObj.t2.focus();
	return false;
	}
	if(formObj.t3.value.length==0)
	{
	alert("Please Enter Contact No");
	formObj.t3.focus();
	return false;
	}
	if(formObj.t3.value.length==0)
	{
	alert("Please Enter Contact No");
	formObj.t3.focus();
	return false;
	}
	if(isNaN(formObj.t3.value)){
		alert("Contact No must be numeric");
		formObj.t3.focus();
		return false;
	}
	if(formObj.t4.value.length==0)
	{
	alert("Please Enter Email Id");
	formObj.t4.focus();
	return false;
	}
	var filter = /^([a-zA-Z0-9_\.\-])+\@([a-z]+\.)+(com)+$/;
    if (!filter.test(formObj.t4.value)) {
		window.alert('Please enter valid email address');
		formObj.t4.focus();
		return false;
	}
	if(formObj.t5.value.length==0)
	{
	alert("Please Enter Home address");
	formObj.t5.focus();
	return false;
	}
	return true;
	}
	</script>
	
</head>
<style>
body {

}
</style>

			<li><a href="{% url 'UserLogin' %}"><font size="3" color="white">User Login</a></li><td></td>
			<li><a href="{% url 'Register' %}"><font size="3" color="white">New User Signup Here</a></li><td></td>
			<td></td>		     
		</ul>
        </div>
        <div class="hbg"><img src="{% static 'images/header_images.jpg' %}" width="915" height="286" alt="" /></div>
      				<center>
<form name="f1" method="post" action={% url 'RegisterAction' %} onsubmit="return validate(this);">
{% csrf_token %}<br/>
   <h2><b>New User Signup Page</b></h2>
   
	<font size="" color="red"><center>{{ data|safe }}</center></font>

			  <tr><td><font size='' color="black"><b>Username</b></td><td><input name="t1" type="Text" size="30"></td></td></tr>

		  <tr><td><font size='' color="black"><b>Contact&nbsp;No</b></td>
			<td><input name="t3" type="Text" size="15"></td></td></tr>

		    
		   <tr><td><font size='' color="black"><b>Email&nbsp;Id</b></td><td><input type="text" name="t4" style="font-family: Comic Sans MS" size="40"/></td></tr>

          <tr><td><font size='' color="black"><b>Home&nbsp;Address</b></td><td><input name="t5" type="Text" size="60"></td></td></tr>

</html>
