{% load static %}
<html>
<head>
<title>Online Vehicle Parking</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
<script language="javascript">
	function validate(formObj)
	{
	if(formObj.t2.value.length==0)
	{
	alert("Please Enter total slots");
	formObj.t2.focus();
	return false;
	}
	if(formObj.t3.value.length==0)
	{
	alert("Please Enter parking cost");
	formObj.t3.focus();
	return false;
	}
	return true;
	}
	</script>
	
</head>
<style>
body {
  background-image: url("{% static 'images/back.jpg' %}");
}
</style>
<body>
<div class="main">
  <div class="main_resize">
    <div class="header">
      <div class="logo">
        <h1><span>Online Vehicle Parking Reservation System</span><small></small></h1>
      </div>
    </div>
    <div class="content">
      <div class="content_bg">
        <div class="menu_nav">
    <ul>      
     <li><a href="{% url 'AddArea' %}"><font size="3" color="white">Add Parking Area</a></li>
	 <li><a href="{% url 'ModifyArea' %}"><font size="3" color="white">Modify Parking Area</a></li>
	 <li><a href="{% url 'ViewUsers' %}"><font size="3" color="white">View Users</a></li>
	 <li><a href="{% url 'ViewOccupancy' %}"><font size="3" color="white">View Occupancy</a></li>
	 <li><a href="{% url 'index' %}"><font size="3" color="white">Logout</a></li>
   </ul>      
        </div>
        <div class="hbg"><img src="{% static 'images/header_images.jpg' %}" width="915" height="286" alt="" /></div>

			</table>
